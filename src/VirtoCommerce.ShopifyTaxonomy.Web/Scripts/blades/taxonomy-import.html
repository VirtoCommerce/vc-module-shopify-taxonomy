<div class="blade-static __bottom">
  <button class="btn" ng-click="startImport()">
    {{ 'ShopifyTaxonomy.blades.import-blade.labels.start-import' | translate }}
  </button>
</div>
<div class="blade-content">
  <div class="blade-inner">
    <div class="inner-block">
      <from name="shopifyImportForm">
        <fieldset ng-init="setForm(shopifyImportForm)">
          <div class="form-group">
            <label class="form-label">{{ 'ShopifyTaxonomy.blades.import-blade.labels.import-properties' | translate }}</label>
            <div class="form-input">
              <label class="form-label __switch">
                <input type="checkbox" ng-model="blade.importProperties">
                <span class="switch"></span>
              </label>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">{{ 'ShopifyTaxonomy.blades.import-blade.labels.import-localizations' | translate }}</label>
            <div class="form-input">
              <label class="form-label __switch">
                <input type="checkbox" ng-model="blade.importLocalizations">
                <span class="switch"></span>
              </label>
            </div>
          </div>
        </fieldset>
      </from>
    </div>
  </div>
</div>
